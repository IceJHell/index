<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Щенячий Патруль — Задания для Кристины</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --red:#E8322A; --blue:#1B6FBE; --yellow:#FFD600;
  --orange:#F97316; --green:#2DBF5E; --sky:#7DD3FC;
  --darkblue:#0F3F7A; --cream:#FFF8E7; --pawbrown:#C8A96E;
  --ink:#1A1A2E; --mid:#5A6A7A; --white:#FFFFFF;
}

body{
  font-family:'Nunito',Arial,sans-serif;
  background: linear-gradient(180deg, #87CEEB 0%, #B8E4F7 40%, #E8F7FF 100%);
  min-height:100vh; color:var(--ink); overflow-x:hidden;
}

/* Clouds background */
body::before{
  content:'';
  position:fixed; top:0; left:0; width:100%; height:100%;
  background-image:
    radial-gradient(ellipse 120px 60px at 10% 8%, rgba(255,255,255,.7) 100%, transparent 100%),
    radial-gradient(ellipse 80px 40px at 15% 7%, rgba(255,255,255,.7) 100%, transparent 100%),
    radial-gradient(ellipse 100px 50px at 70% 5%, rgba(255,255,255,.7) 100%, transparent 100%),
    radial-gradient(ellipse 70px 35px at 75% 4%, rgba(255,255,255,.7) 100%, transparent 100%),
    radial-gradient(ellipse 90px 45px at 45% 12%, rgba(255,255,255,.6) 100%, transparent 100%);
  pointer-events:none; z-index:0;
}

.screen{display:none;flex-direction:column;align-items:center;min-height:100vh;padding:16px 14px 50px;position:relative;z-index:1}
.screen.active{display:flex}

/* ══ PAW PRINT SVG ══ */
.paws-deco{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;overflow:hidden}

/* ══ WELCOME ══ */
#welcome{justify-content:center;text-align:center;gap:14px}

.pp-logo{
  background:var(--red); border-radius:50%;
  width:110px; height:110px; display:flex; align-items:center; justify-content:center;
  font-size:56px; box-shadow:0 6px 0 #9B1C1C, 0 0 0 5px var(--yellow), 0 0 0 9px var(--red);
  animation:float 2.5s ease-in-out infinite; margin:0 auto;
}
.pp-title{
  font-family:'Fredoka One',cursive;
  font-size:clamp(28px,8vw,52px); line-height:1.05;
  color:var(--white);
  text-shadow: 3px 3px 0 var(--red), 5px 5px 0 var(--darkblue);
  letter-spacing:1px;
}
.pp-sub{
  background:var(--white); border-radius:20px; padding:12px 20px;
  font-size:16px; font-weight:700; color:var(--darkblue);
  box-shadow:0 4px 0 rgba(0,0,0,.15); max-width:340px;
}
.badge-patrol{
  background:linear-gradient(135deg,var(--red),var(--orange));
  color:var(--white); font-family:'Fredoka One',cursive;
  font-size:15px; padding:8px 22px; border-radius:50px;
  box-shadow:0 4px 0 #9B1C1C; letter-spacing:1px;
}
.btn-go{
  background:linear-gradient(135deg,var(--yellow),var(--orange));
  color:var(--darkblue); border:none; border-radius:50px;
  padding:18px 52px; font-size:26px; font-weight:900; font-family:'Fredoka One',cursive;
  cursor:pointer; box-shadow:0 7px 0 #B45309; transition:all .12s;
  letter-spacing:1px; margin-top:4px;
}
.btn-go:active{transform:translateY(6px);box-shadow:0 1px 0 #B45309}

.dogs-row{display:flex;gap:10px;justify-content:center;font-size:48px;animation:float 3s ease-in-out infinite}

/* ══ TOP BAR ══ */
.top-bar{
  width:100%; max-width:520px;
  background:var(--red); border-radius:20px; padding:12px 16px;
  box-shadow:0 5px 0 #9B1C1C; margin-bottom:12px; display:flex; flex-direction:column; gap:6px;
}
.prog-wrap{width:100%;height:18px;background:rgba(0,0,0,.25);border-radius:50px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--yellow),var(--orange));border-radius:50px;transition:width .5s}
.top-info{display:flex;justify-content:space-between;align-items:center}
.top-lbl{font-family:'Fredoka One',cursive;font-size:15px;color:var(--white);letter-spacing:.5px}
.top-score{background:var(--yellow);border-radius:12px;padding:3px 12px;font-family:'Fredoka One',cursive;font-size:15px;color:var(--darkblue)}

/* ══ TASK SCREEN ══ */
#task-screen{gap:12px;max-width:520px;width:100%;margin:0 auto}

.cat-pill{
  font-family:'Fredoka One',cursive; font-size:14px; letter-spacing:1px;
  padding:7px 22px; border-radius:50px; color:var(--white);
  background:var(--blue); box-shadow:0 4px 0 var(--darkblue);
  align-self:center; white-space:nowrap;
}
.cat-pill.hard{background:var(--red);box-shadow:0 4px 0 #9B1C1C}

.task-q{
  font-family:'Fredoka One',cursive;
  font-size:clamp(18px,4.8vw,26px); text-align:center; line-height:1.35;
  color:var(--darkblue); text-shadow:1px 1px 0 rgba(255,255,255,.5);
  max-width:500px;
}
.hint{
  font-size:13px; color:var(--blue); font-weight:700; text-align:center;
  background:rgba(255,255,255,.6); border-radius:12px; padding:6px 14px;
  border-left:4px solid var(--yellow);
}

.task-vis{
  background:var(--white); border-radius:24px; padding:20px 14px; width:100%;
  display:flex; align-items:center; justify-content:center; flex-wrap:wrap;
  box-shadow:0 5px 0 rgba(0,0,0,.12); min-height:120px; gap:8px;
  border:3px solid rgba(27,111,190,.15);
}

.opts{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%}

.opt{
  background:var(--white); border:3px solid #CBE4F8; border-radius:20px;
  padding:13px 8px; cursor:pointer; font-family:'Nunito',Arial,sans-serif;
  display:flex; align-items:center; justify-content:center; flex-direction:column; gap:5px;
  min-height:88px; transition:border-color .15s, transform .12s, box-shadow .15s;
  box-shadow:0 5px 0 #A0C4E8; font-weight:700;
}
.opt:hover:not(:disabled){
  border-color:var(--yellow); transform:translateY(-3px); box-shadow:0 8px 0 #B45309;
}
.opt:disabled{cursor:default}
.opt.wrong{
  border-color:var(--red)!important; background:#FFF0EF;
  box-shadow:0 5px 0 #9B1C1C!important; animation:shake .4s;
}
.opt-txt{font-size:13px;color:var(--mid);font-weight:700;text-align:center;line-height:1.2;margin-top:2px}

/* EXPLAIN */
.explain{
  background:var(--cream); border:3px solid var(--yellow); border-radius:18px;
  padding:12px 16px; font-size:14px; font-weight:700; color:var(--darkblue);
  width:100%; max-width:520px; display:none; line-height:1.5; text-align:center;
  box-shadow:0 4px 0 #B45309;
}
.explain.show{display:block}

/* ══ FEEDBACK ══ */
#fb{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);
  font-size:90px;z-index:300;pointer-events:none}
#fb.pop{animation:popIt .65s forwards}

/* ══ FINISH ══ */
#finish{justify-content:center;text-align:center;gap:20px}

.fin-shield{
  width:130px; height:130px; margin:0 auto;
  background:linear-gradient(135deg,var(--red),var(--orange));
  clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
  display:flex; align-items:center; justify-content:center;
  font-size:60px; animation:float 2s ease-in-out infinite;
  box-shadow:0 8px 24px rgba(232,50,42,.4);
}
.fin-title{
  font-family:'Fredoka One',cursive;
  font-size:clamp(34px,9vw,58px); line-height:1.05;
  color:var(--white);
  text-shadow:3px 3px 0 var(--red), 5px 5px 0 var(--darkblue);
}
.fin-sub{font-size:18px;font-weight:700;color:var(--darkblue);
  background:rgba(255,255,255,.7);border-radius:14px;padding:8px 18px}
.fin-stars{font-size:46px;letter-spacing:4px}
.btn-again{
  background:linear-gradient(135deg,var(--blue),var(--darkblue));
  color:var(--white); border:none; border-radius:50px; padding:16px 44px;
  font-size:22px; font-weight:900; font-family:'Fredoka One',cursive;
  cursor:pointer; box-shadow:0 6px 0 #0F3F7A; transition:all .12s; letter-spacing:1px;
}
.btn-again:active{transform:translateY(5px);box-shadow:0 1px 0 #0F3F7A}

/* CANVAS */
#cv{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:200}

/* GRID */
.grid-wrap{display:flex;flex-direction:column;gap:2px}
.grid-row{display:flex;gap:2px}
.gcell{width:40px;height:40px;border-radius:6px;border:2px solid #CBD5E1;
  display:flex;align-items:center;justify-content:center;font-size:18px;background:#F8FAFC}
.gcell.start{background:#FEF9C3;border-color:#F59E0B}
.gcell.end{background:#DCFCE7;border-color:#22C55E}
.gcell.path{background:#EDE9FE;border-color:#8B5CF6}

/* ANIMATIONS */
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-10px)}75%{transform:translateX(10px)}}
@keyframes popIt{
  0%{transform:translate(-50%,-50%)scale(0);opacity:0}
  50%{transform:translate(-50%,-50%)scale(1.3);opacity:1}
  80%{transform:translate(-50%,-50%)scale(.9);opacity:1}
  100%{transform:translate(-50%,-50%)scale(1.2);opacity:0}
}
@keyframes pawFloat{
  0%{transform:translateY(0) rotate(-10deg); opacity:.12}
  50%{transform:translateY(-15px) rotate(10deg); opacity:.2}
  100%{transform:translateY(0) rotate(-10deg); opacity:.12}
}
.paw-bg{
  position:fixed; font-size:40px; opacity:.12; pointer-events:none; z-index:0;
  animation:pawFloat linear infinite;
}
</style>
</head>
<body>

<!-- Floating paws background -->
<div id="pawbg"></div>

<!-- WELCOME -->
<div id="welcome" class="screen active">
  <div class="pp-logo">🐾</div>
  <div class="pp-title">Щенячий<br>Патруль</div>
  <div class="badge-patrol">🐶 Математическая миссия 🐶</div>
  <div class="dogs-row">🐕‍🦺🐩🐕🦮</div>
  <div class="pp-sub">32 задания — от простых до суперсложных!<br>Хватит ли смелости пройти все? 🦴</div>
  <button class="btn-go" onclick="startGame()">На задание! 🚀</button>
</div>

<!-- TASK -->
<div id="task-screen" class="screen">
  <div class="top-bar">
    <div class="top-info">
      <div class="top-lbl" id="pl">Задание 1 из 32</div>
      <div class="top-score" id="sb">🦴 0</div>
    </div>
    <div class="prog-wrap"><div class="prog-fill" id="pf" style="width:0%"></div></div>
    <div class="top-lbl" id="lvl" style="font-size:12px;opacity:.85">⭐ Уровень 1</div>
  </div>
  <div class="cat-pill" id="cp"></div>
  <div class="task-q" id="tq"></div>
  <div class="hint" id="th"></div>
  <div class="task-vis" id="tv"></div>
  <div class="opts" id="op"></div>
  <div class="explain" id="ex"></div>
</div>

<!-- FINISH -->
<div id="finish" class="screen">
  <canvas id="cv"></canvas>
  <div class="fin-shield" id="fi">🏆</div>
  <div class="fin-title" id="ft">Молодец!</div>
  <div class="fin-sub" id="fs"></div>
  <div class="fin-stars" id="fst"></div>
  <button class="btn-again" onclick="restart()">Ещё миссия! 🔄</button>
</div>

<div id="fb"></div>

<script>
/* ── FLOATING PAWS ── */
(function(){
  const pb = document.getElementById('pawbg');
  const pawEmojis = ['🐾','🦴','⭐','🐶','🌟'];
  for(let i=0;i<18;i++){
    const el=document.createElement('span');
    el.className='paw-bg';
    el.textContent=pawEmojis[i%pawEmojis.length];
    el.style.left=Math.random()*95+'%';
    el.style.top=Math.random()*100+'%';
    el.style.animationDuration=(4+Math.random()*5)+'s';
    el.style.animationDelay=(-Math.random()*6)+'s';
    el.style.fontSize=(24+Math.random()*30)+'px';
    pb.appendChild(el);
  }
})();

/* ── SVG helpers ── */
const SZ = 56;
const circle  = (c,s=SZ)=>`<svg width="${s}" height="${s}"><circle cx="${s/2}" cy="${s/2}" r="${s/2-3}" fill="${c}" stroke="#fff" stroke-width="2.5"/></svg>`;
const square  = (c,s=SZ)=>`<svg width="${s}" height="${s}"><rect x="4" y="4" width="${s-8}" height="${s-8}" rx="9" fill="${c}" stroke="#fff" stroke-width="2.5"/></svg>`;
const tri     = (c,s=SZ)=>{const p=`${s/2},4 ${s-4},${s-4} 4,${s-4}`;return`<svg width="${s}" height="${s}"><polygon points="${p}" fill="${c}" stroke="#fff" stroke-width="2.5"/></svg>`};
const pentagon= (c,s=SZ)=>{const pts=[],cx=s/2,cy=s/2;for(let i=0;i<5;i++){const a=(i*72-90)*Math.PI/180;pts.push(`${cx+(s/2-4)*Math.cos(a)},${cy+(s/2-4)*Math.sin(a)}`)}return`<svg width="${s}" height="${s}"><polygon points="${pts.join(' ')}" fill="${c}" stroke="#fff" stroke-width="2.5"/></svg>`};
const num = (n,c='#1A1A2E')=>`<span style="font-family:'Fredoka One',cursive;font-size:48px;font-weight:400;color:${c}">${n}</span>`;
const big = (s,sz=46)=>`<span style="font-size:${sz}px;line-height:1.1">${s}</span>`;
const lbl = (t)=>`<div class="opt-txt">${t}</div>`;

function makeGrid(rows,cols,startR,startC,endR,endC,paths=[]){
  let h='<div class="grid-wrap">';
  for(let r=0;r<rows;r++){h+='<div class="grid-row">';
    for(let c=0;c<cols;c++){
      const isS=r===startR&&c===startC, isE=r===endR&&c===endC;
      const isP=paths.some(p=>p[0]===r&&p[1]===c);
      const cls=isS?'gcell start':isE?'gcell end':isP?'gcell path':'gcell';
      const icon=isS?'🐕':isE?'🦴':'';
      h+=`<div class="${cls}">${icon}</div>`;
    }h+='</div>';
  }h+='</div>';return h;
}

/* ── TASKS ── */
const TASKS = [
  {
    cat:'🔢 Сравни',
    q:'Какая группа БОЛЬШЕ — красные или синие?',
    hint:'Считай внимательно!',
    vis:`<div style="display:flex;flex-direction:column;gap:10px;align-items:center">
           <div style="display:flex;gap:4px;align-items:center">${circle('#E8322A',34).repeat(7)}<span style="font-size:13px;font-weight:900;color:#5A6A7A;margin-left:6px">красные</span></div>
           <div style="display:flex;gap:4px;align-items:center">${circle('#1B6FBE',34).repeat(8)}<span style="font-size:13px;font-weight:900;color:#5A6A7A;margin-left:6px">синие</span></div>
         </div>`,
    opts:[
      {v:circle('#E8322A',48)+lbl('Красных больше (7)'),ok:false},
      {v:circle('#1B6FBE',48)+lbl('Синих больше (8)'),ok:true},
      {v:'<span style="font-size:26px;font-weight:900">=</span>'+lbl('Их поровну'),ok:false},
      {v:big('🤷',36)+lbl('Не знаю'),ok:false},
    ],
    explain:'Красных 7, синих 8. 8 > 7, значит синих больше!'
  },
  {
    cat:'🔢 Числа',
    q:'Какое число — ЛИШНЕЕ? Найди то, которое не похоже на остальные!',
    hint:'Почему три числа "дружат", а одно — нет?',
    vis:`<div style="display:flex;gap:14px;flex-wrap:wrap;justify-content:center">
           ${[2,4,7,6].map(n=>`<div style="background:#EFF6FF;border-radius:14px;padding:10px 20px;font-family:'Fredoka One',cursive;font-size:44px;color:#1A1A2E">${n}</div>`).join('')}
         </div>`,
    opts:[{v:num(2),ok:false},{v:num(4),ok:false},{v:num(7),ok:true},{v:num(6),ok:false}],
    explain:'2, 4, 6 — чётные. А 7 — нечётное, поэтому оно лишнее!'
  },
  {
    cat:'➕ Состав числа',
    q:'В вазе было 9 яблок. 4 уже съели. Сколько осталось?',
    hint:'',
    vis:`<div style="display:flex;align-items:center;gap:12px;justify-content:center;flex-wrap:wrap">
           <div style="background:#FEF9C3;border-radius:14px;padding:12px;font-size:13px;font-weight:900;text-align:center;color:#92400E">Было<br><span style="font-size:40px">9🍎</span></div>
           <span style="font-size:30px;font-weight:900;color:#5A6A7A">−</span>
           <div style="background:#FFF1F2;border-radius:14px;padding:12px;font-size:13px;font-weight:900;text-align:center;color:#9F1239">Съели<br><span style="font-size:40px">4🍎</span></div>
           <span style="font-size:30px;font-weight:900;color:#5A6A7A">=</span>
           <span style="font-family:'Fredoka One',cursive;font-size:44px;color:#E8322A">?</span>
         </div>`,
    opts:[{v:num(4),ok:false},{v:num(6),ok:false},{v:num(5),ok:true},{v:num(3),ok:false}],
    explain:'9 − 4 = 5. Осталось 5 яблок!'
  },
  {
    cat:'🔢 Порядковый счёт',
    q:'Зайка стоит ЧЕТВЁРТЫМ слева. Какой по счёту стоит котик?',
    hint:'Считай слева направо!',
    vis:`<div style="display:flex;gap:6px;align-items:flex-end;justify-content:center;flex-wrap:wrap">
           ${['🐶','🐸','🐻','🐰','🐱','🦊'].map((a,i)=>`
             <div style="text-align:center">
               <div style="font-size:36px">${a}</div>
               <div style="font-size:12px;font-weight:900;color:${a==='🐰'?'#E8322A':'#94A3B8'};margin-top:2px">${i+1}</div>
             </div>`).join('')}
         </div>`,
    opts:[{v:num(4)+lbl('Четвёртый'),ok:false},{v:num(5)+lbl('Пятый'),ok:true},{v:num(6)+lbl('Шестой'),ok:false},{v:num(3)+lbl('Третий'),ok:false}],
    explain:'🐶-1, 🐸-2, 🐻-3, 🐰-4 (зайка), 🐱-5. Котик стоит ПЯТЫМ!'
  },
  {
    cat:'📝 Задача',
    q:'У Маши было 6 конфет. Она дала 2 Пете и получила 3 от мамы. Сколько конфет стало?',
    hint:'Это два действия! Сначала вычти, потом прибавь.',
    vis:`<div style="display:flex;flex-direction:column;align-items:center;gap:10px;font-size:14px;font-weight:700;color:#475569">
           <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:center">
             <div style="background:#EDE9FE;border-radius:10px;padding:8px 14px">Было: <b style="color:#7C3AED;font-size:20px">6</b> 🍬</div>
             <span>→</span>
             <div style="background:#FFF1F2;border-radius:10px;padding:8px 14px">Дала: <b style="color:#BE123C;font-size:20px">2</b> 🍬</div>
             <span>→</span>
             <div style="background:#F0FFF4;border-radius:10px;padding:8px 14px">Мама дала: <b style="color:#15803D;font-size:20px">3</b> 🍬</div>
           </div>
           <div style="font-family:'Fredoka One',cursive;font-size:22px;color:#E8322A">6 − 2 + 3 = ?</div>
         </div>`,
    opts:[{v:num(7),ok:true},{v:num(8),ok:false},{v:num(5),ok:false},{v:num(9),ok:false}],
    explain:'6 − 2 = 4, потом 4 + 3 = 7. Стало 7 конфет!'
  },
  {
    cat:'➕ Состав числа',
    q:'Найди пропущенное число! 8 = 3 + ?',
    hint:'Из каких двух чисел складывается 8?',
    vis:`<div style="display:flex;align-items:center;gap:12px;justify-content:center">
           <div style="display:flex;gap:3px">${circle('#1B6FBE',30).repeat(8)}</div>
           <span style="font-size:28px;font-weight:900;color:#5A6A7A">=</span>
           <div style="display:flex;flex-direction:column;gap:4px;align-items:center">
             <div style="display:flex;gap:3px">${circle('#E8322A',30).repeat(3)}</div>
             <span style="font-size:13px;font-weight:700;color:#94A3B8">3</span>
           </div>
           <span style="font-size:28px;font-weight:900;color:#5A6A7A">+</span>
           <div style="font-family:'Fredoka One',cursive;font-size:44px;color:#E8322A">?</div>
         </div>`,
    opts:[{v:num(4),ok:false},{v:num(6),ok:false},{v:num(5),ok:true},{v:num(3),ok:false}],
    explain:'8 = 3 + 5. Проверка: 3 + 5 = 8 ✓'
  },
  {
    cat:'📐 Геометрия',
    q:'Какая фигура ЛИШНЯЯ? Подумай, чем она отличается!',

/* ── ENGINE ── */
let tasks=[], idx=0, score=0, answered=false;
const shuffle = a => [...a].sort(()=>Math.random()-.5);

function startGame(){
  tasks = [...shuffle(TASKS), ...TASKS_HARD];
  idx=0; score=0; answered=false;
  show('task-screen'); render();
}
function restart(){ const c=document.getElementById('cv').getContext('2d'); c.clearRect(0,0,9999,9999); startGame(); }
function show(id){ document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); document.getElementById(id).classList.add('active'); }

function render(){
  if(idx>=tasks.length){finish(); return;}
  answered=false;
  document.getElementById('ex').className='explain';
  const t=tasks[idx], tot=tasks.length;
  document.getElementById('pf').style.width=(idx/tot*100)+'%';
  document.getElementById('pl').textContent=`Задание ${idx+1} из ${tot}`;
  document.getElementById('sb').textContent=`🦴 ${score}`;
  const isHard=idx>=TASKS.length;
  document.getElementById('lvl').textContent=isHard
    ? `🔥 Уровень 2 — Задание ${idx-TASKS.length+1} из ${TASKS_HARD.length}`
    : `⭐ Уровень 1 — Задание ${idx+1} из ${TASKS.length}`;
  const pill=document.getElementById('cp');
  pill.textContent=t.cat;
  pill.className='cat-pill'+(isHard?' hard':'');
  document.getElementById('tq').textContent=t.q;
  document.getElementById('th').textContent=t.hint||'';
  document.getElementById('tv').innerHTML=t.vis;
  const sh=shuffle(t.opts);
  const grid=document.getElementById('op');
  grid.innerHTML='';
  sh.forEach(opt=>{
    const btn=document.createElement('button');
    btn.className='opt';
    btn.innerHTML=opt.v;
    btn.onclick=()=>pick(btn,opt.ok,grid,t.explain);
    grid.appendChild(btn);
  });
}

function pick(btn,ok,grid,explain){
  if(answered)return;
  answered=true;
  grid.querySelectorAll('.opt').forEach(b=>b.disabled=true);
  if(ok){ score++; fb('🎉'); }
  else{ btn.classList.add('wrong'); fb('😮'); }
  if(explain){ const ex=document.getElementById('ex'); ex.textContent='🐾 '+explain; ex.className='explain show'; }
  setTimeout(()=>{ idx++; render(); },2600);
}

function fb(e){
  const el=document.getElementById('fb');
  el.textContent=e; el.classList.remove('pop'); void el.offsetWidth; el.classList.add('pop');
  setTimeout(()=>el.classList.remove('pop'),700);
}

function finish(){
  show('finish');
  const tot=tasks.length, pct=score/tot;
  const fi=document.getElementById('fi');
  if(pct>=.87){ fi.textContent='🏆'; document.getElementById('ft').textContent='Суперщенок!'; }
  else if(pct>=.67){ fi.textContent='🌟'; document.getElementById('ft').textContent='Молодец!'; }
  else{ fi.textContent='🐾'; document.getElementById('ft').textContent='Продолжаем тренировку!'; }
  document.getElementById('fs').textContent=`Правильных ответов: ${score} из ${tot}`;
  document.getElementById('fst').textContent=pct>=.87?'⭐⭐⭐⭐⭐':pct>=.67?'⭐⭐⭐⭐':pct>=.47?'⭐⭐⭐':'⭐⭐';
  if(pct>=.5) confetti();
}

function confetti(){
  const cv=document.getElementById('cv');
  const ctx=cv.getContext('2d');
  cv.width=window.innerWidth; cv.height=window.innerHeight;
  const C=['#E8322A','#1B6FBE','#FFD600','#2DBF5E','#F97316','#7DD3FC','#FFF8E7'];
  const shapes=['🐾','🦴','⭐'];
  const ps=Array.from({length:80},()=>({
    x:Math.random()*cv.width, y:Math.random()*-cv.height,
    s:Math.random()*9+6, c:C[Math.floor(Math.random()*C.length)],
    sp:Math.random()*3.5+2, a:Math.random()*Math.PI*2, spin:(Math.random()-.5)*.2,
    isShape:Math.random()>.6, shape:shapes[Math.floor(Math.random()*shapes.length)]
  }));
  let fr;
  const draw=()=>{
    ctx.clearRect(0,0,cv.width,cv.height);
    ps.forEach(p=>{
      ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.a);
      if(p.isShape){ ctx.font=`${p.s*3}px serif`; ctx.fillText(p.shape,-p.s*1.5,-p.s); }
      else{ ctx.fillStyle=p.c; ctx.fillRect(-p.s/2,-p.s/2,p.s,p.s); }
      ctx.restore();
      p.y+=p.sp; p.a+=p.spin; if(p.y>cv.height)p.y=-20;
    });
    fr=requestAnimationFrame(draw);
  };
  draw(); setTimeout(()=>{cancelAnimationFrame(fr); ctx.clearRect(0,0,cv.width,cv.height);},4500);
}
