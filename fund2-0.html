<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Путь к 300K - Практикум №1</title>
    <!-- Подключение React и ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Подключение Babel для обработки JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Подключение Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Подключение шрифтов -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Open+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Open Sans', sans-serif; }
        h1, h2, h3, h4, .font-heading, button, .uppercase, summary { font-family: 'Montserrat', sans-serif; }
        
        @keyframes shine {
            from { left: -100%; }
            to { left: 100%; }
        }
        .animate-shine { animation: shine 2s infinite; }
        
        @keyframes fade-in-up {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-up { animation: fade-in-up 0.8s ease-out forwards; }

        details > summary { list-style: none; }
        details > summary::-webkit-details-marker { display: none; }
        
        /* Скроллбар */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #050505; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #f59e0b; }
    </style>
</head>
<body class="bg-[#050505]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Иконки
        const IconBase = ({ size = 24, className = "", children, ...props }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} {...props}>{children}</svg>
        );
        const Shield = (props) => <IconBase {...props}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" /></IconBase>;
        const TrendingUp = (props) => <IconBase {...props}><polyline points="23 6 13.5 15.5 8.5 10.5 1 18" /><polyline points="17 6 23 6 23 12" /></IconBase>;
        const Wallet = (props) => <IconBase {...props}><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4" /><path d="M3 5v14a2 2 0 0 0 2 2h16v-5" /><path d="M18 12a2 2 0 0 0 0 4h4v-4Z" /></IconBase>;
        const Lock = (props) => <IconBase {...props}><rect x="3" y="11" width="18" height="11" rx="2" ry="2" /><path d="M7 11V7a5 5 0 0 1 10 0v4" /></IconBase>;
        const Zap = (props) => <IconBase {...props}><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" /></IconBase>;
        const Clock = (props) => <IconBase {...props}><circle cx="12" cy="12" r="10" /><polyline points="12 6 12 12 16 14" /></IconBase>;
        const Anchor = (props) => <IconBase {...props}><circle cx="12" cy="5" r="3" /><line x1="12" y1="22" x2="12" y2="8" /><path d="M5 12H2a10 10 0 0 0 20 0h-3" /></IconBase>;
        const BarChart3 = (props) => <IconBase {...props}><line x1="12" y1="20" x2="12" y2="10" /><line x1="18" y1="20" x2="18" y2="4" /><line x1="6" y1="20" x2="6" y2="16" /></IconBase>;
        const ChevronRight = (props) => <IconBase {...props}><polyline points="9 18 15 12 9 6" /></IconBase>;
        const Menu = (props) => <IconBase {...props}><line x1="4" y1="12" x2="20" y2="12" /><line x1="4" y1="6" x2="20" y2="6" /><line x1="4" y1="18" x2="20" y2="18" /></IconBase>;
        const X = (props) => <IconBase {...props}><line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" /></IconBase>;
        const CheckCircle = (props) => <IconBase {...props}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" /><polyline points="22 4 12 14.01 9 11.01" /></IconBase>;
        const Star = (props) => <IconBase {...props}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" /></IconBase>;
        const XCircle = (props) => <IconBase {...props}><circle cx="12" cy="12" r="10" /><line x1="15" y1="9" x2="9" y2="15" /><line x1="9" y1="9" x2="15" y2="15" /></IconBase>;
        const AlertTriangle = (props) => <IconBase {...props}><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z" /><line x1="12" y1="9" x2="12" y2="13" /><line x1="12" y1="17" x2="12.01" y2="17" /></IconBase>;
        const BookOpen = (props) => <IconBase {...props}><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z" /><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z" /></IconBase>;
        const PlayCircle = (props) => <IconBase {...props}><circle cx="12" cy="12" r="10" /><polygon points="10 8 16 12 10 16 10 8" /></IconBase>;
        const Users = (props) => <IconBase {...props}><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" /><circle cx="9" cy="7" r="4" /><path d="M23 21v-2a4 4 0 0 0-3-3.87" /><path d="M16 3.13a4 4 0 0 1 0 7.75" /></IconBase>;
        const HelpCircle = (props) => <IconBase {...props}><circle cx="12" cy="12" r="10" /><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3" /><line x1="12" y1="17" x2="12.01" y2="17" /></IconBase>;
        const Send = (props) => <IconBase {...props}><line x1="22" y1="2" x2="11" y2="13" /><polygon points="22 2 15 22 11 13 2 9 22 2" /></IconBase>;
        const Layers = (props) => <IconBase {...props}><polygon points="12 2 2 7 12 12 22 7 12 2" /><polyline points="2 17 12 22 22 17" /><polyline points="2 12 12 17 22 12" /></IconBase>;
        const Info = (props) => <IconBase {...props}><circle cx="12" cy="12" r="10" /><line x1="12" y1="16" x2="12" y2="12" /><line x1="12" y1="8" x2="12.01" y2="8" /></IconBase>;
        const ChevronDown = (props) => <IconBase {...props}><polyline points="6 9 12 15 18 9" /></IconBase>;

        // Управление прокруткой
        const scrollToSection = (id) => {
            const element = document.getElementById(id);
            if (element) {
                element.scrollIntoView({ behavior: 'smooth' });
            }
        };

        // Sticky Timer
        const StickyTimer = ({ onCTAClick }) => {
            const [timeLeft, setTimeLeft] = useState(47 * 60 * 60 + 59 * 60 + 59);
            const [isVisible, setIsVisible] = useState(false);

            useEffect(() => {
                const handleScroll = () => setIsVisible(window.scrollY > 600);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            useEffect(() => {
                const timer = setInterval(() => setTimeLeft((p) => (p > 0 ? p - 1 : 0)), 1000);
                return () => clearInterval(timer);
            }, []);

            const formatTime = (s) => {
                const h = Math.floor(s / 3600);
                const m = Math.floor((s % 3600) / 60);
                const sec = s % 60;
                return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`;
            };

            if (!isVisible) return null;

            return (
                <div className="fixed bottom-0 left-0 w-full bg-[#1a1a1a]/95 backdrop-blur-md border-t border-amber-500/30 py-3 md:py-4 z-50 animate-fade-in-up shadow-[0_-10px_40px_-5px_rgba(0,0,0,0.5)]">
                    <div className="container mx-auto px-4 flex flex-col md:flex-row justify-between items-center gap-3">
                        <div className="flex items-center gap-3 text-white">
                            <AlertTriangle size={24} className="text-amber-500 animate-pulse hidden md:block" />
                            <div className="flex items-center gap-2 md:gap-3">
                                <span className="font-heading font-bold text-xs md:text-sm uppercase tracking-wider text-slate-300">Цены повысятся через:</span>
                                <span className="font-mono font-bold text-lg md:text-xl text-amber-500 tabular-nums tracking-widest bg-black/40 px-2 py-1 rounded border border-amber-500/20">
                                    {formatTime(timeLeft)}
                                </span>
                            </div>
                        </div>
                        <button onClick={() => onCTAClick('tariffs')} className="w-full md:w-auto px-6 py-2 bg-gradient-to-r from-amber-600 to-yellow-500 text-black font-bold text-sm uppercase tracking-widest rounded hover:shadow-[0_0_15px_rgba(245,158,11,0.4)] transition-all text-center font-heading cursor-pointer">
                            ЗАНЯТЬ МЕСТО НА ПРАКТИКУМЕ
                        </button>
                    </div>
                </div>
            );
        };

        const LandingPage = () => {
          const [isScrolled, setIsScrolled] = useState(false);
          const [isMenuOpen, setIsMenuOpen] = useState(false);
          
          // Состояние для управления модалкой оплаты
          const [modalUrl, setModalUrl] = useState(null);

          useEffect(() => {
            const handleScroll = () => setIsScrolled(window.scrollY > 50);
            window.addEventListener('scroll', handleScroll);
            return () => window.removeEventListener('scroll', handleScroll);
          }, []);

          const handleNavClick = (id) => {
            scrollToSection(id);
            setIsMenuOpen(false);
          };

          // Функция для открытия виджета оплаты
          const openPaymentWidget = (url) => {
            setModalUrl(url);
          };

          return (
            <div className="min-h-screen bg-[#050505] text-slate-200 selection:bg-amber-500/30 selection:text-amber-200 overflow-x-hidden pb-24 font-sans">
              
              {/* --- БЛОК 1: ШАПКА --- */}
              <nav className={`fixed w-full z-50 transition-all duration-500 ${isScrolled ? 'bg-[#050505]/95 backdrop-blur-xl py-4 border-b border-white/5' : 'bg-transparent py-6'}`}>
                <div className="container mx-auto px-4 flex justify-between items-center">
                  <div className="flex items-center cursor-pointer" onClick={() => handleNavClick('hero')}>
                    <img src="логотип 300К цвет (2).png" alt="Logo" className="h-10 md:h-12 w-auto object-contain drop-shadow-[0_0_15px_rgba(255,255,255,0.1)]" onError={(e) => { e.target.style.display = 'none'; e.target.nextSibling.style.display = 'block'; e.target.nextSibling.classList.remove('hidden'); }} />
                    <div className="hidden text-xl font-bold text-white tracking-widest uppercase font-heading">ПУТЬ К <span className="text-amber-500">300K</span></div>
                  </div>
                  
                  <div className="hidden md:flex space-x-6 lg:space-x-8 text-xs font-bold tracking-widest uppercase text-slate-400 font-heading">
                    <button onClick={() => handleNavClick('hero')} className="hover:text-amber-400 transition-colors">Главная</button>
                    <button onClick={() => handleNavClick('benefits')} className="hover:text-amber-400 transition-colors">Преимущества</button>
                    <button onClick={() => handleNavClick('program')} className="hover:text-amber-400 transition-colors">Что внутри</button>
                    <button onClick={() => handleNavClick('tariffs')} className="hover:text-amber-400 transition-colors">Тарифы</button>
                  </div>

                  <button 
                    onClick={() => handleNavClick('tariffs')}
                    className="hidden md:block px-6 py-2 bg-gradient-to-r from-amber-600 to-yellow-500 text-black rounded font-bold hover:shadow-[0_0_20px_rgba(245,158,11,0.4)] transition-all uppercase text-xs font-heading cursor-pointer"
                  >
                    УЧАСТВОВАТЬ
                  </button>

                  <button className="md:hidden text-amber-500" onClick={() => setIsMenuOpen(!isMenuOpen)}>
                    {isMenuOpen ? <X size={28} /> : <Menu size={28} />}
                  </button>
                </div>

                {isMenuOpen && (
                  <div className="md:hidden absolute top-full left-0 w-full bg-[#0a0a0a] border-b border-amber-900/30 p-6 flex flex-col space-y-4 shadow-2xl animate-in slide-in-from-top-5">
                    <button onClick={() => handleNavClick('hero')} className="text-left font-heading font-bold text-amber-500">Главная</button>
                    <button onClick={() => handleNavClick('benefits')} className="text-left font-heading font-bold text-white">Преимущества</button>
                    <button onClick={() => handleNavClick('program')} className="text-left font-heading font-bold text-white">Что внутри</button>
                    <button onClick={() => handleNavClick('tariffs')} className="text-left font-heading font-bold text-white">Тарифы</button>
                    <button onClick={() => handleNavClick('tariffs')} className="w-full py-3 bg-gradient-to-r from-amber-600 to-yellow-500 text-black font-bold uppercase text-center block font-heading rounded mt-2">
                        УЧАСТВОВАТЬ
                    </button>
                  </div>
                )}
              </nav>

              {/* --- БЛОК 2: ГЛАВНЫЙ ЭКРАН --- */}
              <section id="hero" className="relative pt-32 pb-20 lg:pt-48 lg:pb-32 px-4 overflow-hidden">
                <div className="container mx-auto max-w-7xl relative z-10">
                  <div className="flex flex-col lg:flex-row items-center gap-12 lg:gap-16">
                    <div className="w-full lg:w-1/2 text-center lg:text-left">
                      <div className="inline-flex items-center gap-2 px-4 py-1.5 border border-amber-500/30 rounded-full bg-amber-900/10 backdrop-blur-sm mb-6 justify-center lg:justify-start">
                        <Star size={12} className="text-amber-400 fill-amber-400" />
                        <span className="text-[10px] md:text-xs font-bold tracking-[0.2em] text-amber-200 uppercase font-heading">Практикум № 1: Фундамент 2.0</span>
                      </div>
                      <h1 className="text-3xl md:text-5xl lg:text-6xl font-bold leading-tight mb-6 text-white font-heading">
                        Как за 14 дней превратить крипту в источник <span className="text-transparent bg-clip-text bg-gradient-to-r from-amber-200 via-yellow-400 to-amber-600">пассивного дохода</span>
                      </h1>
                      <h2 className="text-lg text-slate-300 font-light mb-8 leading-relaxed">
                         Перестаньте гадать, куда пойдет курс. Получайте прибыль от комиссий рынка, даже когда биткоин падает или стоит на месте.
                      </h2>
                      <div className="flex flex-col items-center lg:items-start gap-4">
                        <button onClick={() => handleNavClick('tariffs')} className="group relative px-8 py-4 bg-transparent overflow-hidden rounded transition-all hover:scale-105 inline-block font-heading cursor-pointer">
                          <div className="absolute inset-0 w-full h-full bg-gradient-to-r from-amber-600 via-yellow-500 to-amber-600"></div>
                          <span className="relative flex items-center justify-center gap-2 text-black font-extrabold uppercase tracking-wider text-sm">
                            ЗАНЯТЬ МЕСТО НА ПРАКТИКУМЕ <ChevronRight className="w-4 h-4 text-black stroke-[3]" />
                          </span>
                        </button>
                        <p className="text-xs text-amber-500/80 font-mono uppercase tracking-widest font-heading font-semibold">Старт потока — 1 апреля 2026</p>
                      </div>
                    </div>
                    <div className="w-full lg:w-1/2 flex justify-center lg:justify-end relative">
                        <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[70%] h-[70%] bg-amber-500/10 blur-[80px] rounded-full animate-pulse pointer-events-none"></div>
                        <div className="relative z-10 w-full max-w-md mx-auto">
                            <img src="https://skrinshoter.ru/s/150126/EH2f9JrV.jpg?download=1&name=%D0%A1%D0%BA%D1%80%D0%B8%D0%BD%D1%88%D0%BE%D1%82-15-01-2026%2010:51:53.jpg" alt="Александр Кравцов" className="w-full h-auto object-contain relative z-10 drop-shadow-2xl" onError={(e) => { e.target.src = "https://placehold.co/600x700/111/444?text=Alexander+Kravtsov"; }} />
                            <div className="absolute bottom-0 left-0 w-full h-24 bg-gradient-to-t from-[#050505] to-transparent z-20"></div>
                            <div className="absolute top-0 left-0 w-12 h-full bg-gradient-to-r from-[#050505] to-transparent z-20"></div>
                            <div className="absolute top-0 right-0 w-12 h-full bg-gradient-to-l from-[#050505] to-transparent z-20"></div>
                        </div>
                    </div>
                  </div>
                </div>
              </section>

              {/* --- БЛОК 3: ПРЕИМУЩЕСТВА --- */}
              <section id="benefits" className="py-20 bg-[#0a0a0a] border-y border-white/5">
                <div className="container mx-auto px-4 max-w-6xl">
                  <div className="grid md:grid-cols-3 gap-8">
                    <div className="p-8 bg-[#0f0f0f] border border-white/5 hover:border-amber-500/30 transition-all rounded-xl">
                      <Wallet className="text-amber-500 mb-6" size={32} />
                      <h3 className="text-xl font-bold mb-4 text-white font-heading">Низкий порог входа</h3>
                      <p className="text-slate-400 text-sm leading-6">Вам не нужны миллионы. Начните стратегию с 100 $. Деньги не блокируются: вы можете забрать тело депозита и прибыль в любую секунду.</p>
                    </div>
                    <div className="p-8 bg-[#0f0f0f] border border-white/5 hover:border-amber-500/30 transition-all rounded-xl">
                      <BarChart3 className="text-amber-500 mb-6" size={32} />
                      <h3 className="text-xl font-bold mb-4 text-white font-heading">Экономика, а не магия</h3>
                      <p className="text-slate-400 text-sm leading-6">Никаких «воздушных» процентов. Ваш доход — это реальная комиссия, которую платят трейдеры за обмены. Вы становитесь «обменником», а не игроком.</p>
                    </div>
                    <div className="p-8 bg-[#0f0f0f] border border-white/5 hover:border-amber-500/30 transition-all rounded-xl">
                      <Anchor className="text-amber-500 mb-6" size={32} />
                      <h3 className="text-xl font-bold mb-4 text-white font-heading">Фундаментальные активы</h3>
                      <p className="text-slate-400 text-sm leading-6">Используются только фундаментальные активы, такие как BTC, ETH и USDT. Никаких мем-токенов, которые могут обесцениться за ночь.</p>
                    </div>
                  </div>
                </div>
              </section>

              {/* --- БЛОК 4: ПОЧЕМУ ЭТО БЕЗОПАСНО --- */}
              <section className="py-24 bg-[#050505]">
                <div className="container mx-auto max-w-6xl px-4">
                  <div className="text-center mb-16">
                    <h2 className="text-3xl md:text-4xl font-bold mb-4 text-white font-heading">Почему «Фундамент» — оптимальный путь в 2026 году</h2>
                    <div className="w-16 h-1 bg-amber-500 mx-auto"></div>
                  </div>
                  <div className="grid md:grid-cols-2 gap-8">
                    <div className="flex gap-5">
                        <TrendingUp className="text-amber-500 shrink-0" size={28} />
                        <div>
                            <h4 className="text-lg font-bold text-white mb-2 font-heading">Живой денежный поток</h4>
                            <p className="text-slate-400 text-sm">В стандартных инвестициях вы ждете роста месяцами. Здесь прибыль капает каждую минуту. Вы видите результат сразу и можете реинвестировать или выводить на жизнь.</p>
                        </div>
                    </div>
                    <div className="flex gap-5">
                        <Lock className="text-amber-500 shrink-0" size={28} />
                        <div>
                            <h4 className="text-lg font-bold text-white mb-2 font-heading">Полный контроль над активами</h4>
                            <p className="text-slate-400 text-sm">Вы не отправляете деньги в управление фондам или мне. Все активы лежат на вашем личном кошельке (MetaMask, Rabby, OneKey и др.).</p>
                        </div>
                    </div>
                    <div className="flex gap-5">
                        <Shield className="text-amber-500 shrink-0" size={28} />
                        <div>
                            <h4 className="text-lg font-bold text-white mb-2 font-heading">На стороне «умных денег»</h4>
                            <p className="text-slate-400 text-sm">Мы не пытаемся обыграть рынок. Мы предоставляем рынку ликвидность — то, на чем зарабатывают биржи и банки. Даже альткоины начнут приносить прибыль.</p>
                        </div>
                    </div>
                    <div className="flex gap-5">
                        <Clock className="text-amber-500 shrink-0" size={28} />
                        <div>
                            <h4 className="text-lg font-bold text-white mb-2 font-heading">Никакого трейдинга</h4>
                            <p className="text-slate-400 text-sm">Вам не нужно сидеть у монитора 24/7 с красными глазами. Настройка занимает пару вечеров во время практикума, дальше система работает автоматически.</p>
                        </div>
                    </div>
                  </div>
                </div>
              </section>

              {/* --- БЛОК 5: ДЛЯ КОГО --- */}
              <section className="py-24 bg-[#0a0a0a]">
                <div className="container mx-auto px-4 max-w-5xl">
                  <h2 className="text-3xl font-bold text-white mb-12 text-center font-heading uppercase">ЭТОТ ПРАКТИКУМ ДЛЯ ВАС, ЕСЛИ ВЫ:</h2>
                  <div className="space-y-6">
                    <div className="bg-[#111] p-6 border-l-4 border-amber-500 rounded-r-lg">
                        <h3 className="text-lg font-bold text-white mb-1 font-heading">Застряли в дне сурка «от зарплаты до зарплаты»</h3>
                        <p className="text-slate-400 text-sm">Вы поняли, что, работая 24/7, богаче не стать. Вам нужен инструмент, который генерирует деньги, пока вы заняты своими делами.</p>
                    </div>
                    <div className="bg-[#111] p-6 border-l-4 border-amber-500 rounded-r-lg">
                        <h3 className="text-lg font-bold text-white mb-1 font-heading">С тревогой смотрите, как тают накопления</h3>
