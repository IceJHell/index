<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Весёлые животные — Задания для Кристины</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --pink:#FF6B9D; --orange:#FF9B3C; --yellow:#FFD93D;
  --green:#4CAF50; --teal:#26C6DA; --blue:#42A5F5;
  --purple:#AB47BC; --red:#EF5350;
  --bg:#FFFDE7; --ink:#2D2D2D; --mid:#6B7280; --white:#FFFFFF;
}
body{
  font-family:'Nunito','Arial Rounded MT Bold',Arial,sans-serif;
  background:var(--bg); min-height:100vh; color:var(--ink); overflow-x:hidden;
}

/* ── GRASS BACKGROUND ── */
body::before{
  content:'';
  position:fixed; bottom:0; left:0; width:100%; height:80px;
  background:linear-gradient(180deg,transparent 0%,#C8E6C9 100%);
  pointer-events:none; z-index:0;
}

/* ── FLOATING ANIMALS ── */
.float-animal{
  position:fixed; font-size:32px; opacity:.15; pointer-events:none; z-index:0;
  animation:animalFloat linear infinite;
}
@keyframes animalFloat{
  0%{transform:translateY(0) rotate(-5deg);opacity:.12}
  50%{transform:translateY(-20px) rotate(5deg);opacity:.2}
  100%{transform:translateY(0) rotate(-5deg);opacity:.12}
}

.screen{display:none;flex-direction:column;align-items:center;min-height:100vh;padding:16px 14px 50px;position:relative;z-index:1}
.screen.active{display:flex}

/* ══ WELCOME ══ */
#welcome{
  justify-content:center; text-align:center; gap:14px;
  background:linear-gradient(180deg,#FFF9C4 0%,#FFFDE7 100%);
}
.w-mascots{font-size:62px;animation:bounce 1.8s ease-in-out infinite;line-height:1.2}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}

.w-title{
  font-size:clamp(30px,8vw,52px); font-weight:900; line-height:1.1;
  color:var(--ink);
}
.w-title span.t1{color:var(--orange)}
.w-title span.t2{color:var(--pink)}

.w-animals-row{
  display:flex; gap:6px; justify-content:center; flex-wrap:wrap;
  font-size:36px; background:var(--white); border-radius:24px;
  padding:14px 20px; box-shadow:0 4px 16px rgba(0,0,0,.08);
  max-width:340px;
}
.w-sub{
  font-size:16px; font-weight:700; color:var(--mid);
  background:var(--white); border-radius:16px; padding:12px 18px;
  box-shadow:0 3px 10px rgba(0,0,0,.07); max-width:320px; line-height:1.5;
}
.badge-lvl{
  background:linear-gradient(135deg,var(--orange),var(--pink));
  color:var(--white); font-size:13px; font-weight:900;
  padding:7px 20px; border-radius:50px; letter-spacing:.5px;
}
.btn-start{
  background:linear-gradient(135deg,var(--pink),var(--orange));
  color:var(--white); border:none; border-radius:50px;
  padding:18px 54px; font-size:24px; font-weight:900; font-family:inherit;
  cursor:pointer; box-shadow:0 6px 0 #C2185B; transition:all .12s; margin-top:6px;
}
.btn-start:active{transform:translateY(5px);box-shadow:0 1px 0 #C2185B}

/* ══ TOP BAR ══ */
.top-bar{
  width:100%; max-width:520px; margin-bottom:12px;
  background:var(--white); border-radius:22px; padding:12px 16px;
  box-shadow:0 4px 16px rgba(0,0,0,.1); display:flex; flex-direction:column; gap:7px;
}
.top-row{display:flex;justify-content:space-between;align-items:center}
.top-lbl{font-size:14px;font-weight:800;color:var(--ink)}
.top-score{
  background:linear-gradient(135deg,var(--yellow),var(--orange));
  border-radius:12px; padding:4px 14px; font-size:14px; font-weight:900; color:var(--ink);
}
.prog-track{width:100%;height:16px;background:#F3F4F6;border-radius:50px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--pink),var(--orange));border-radius:50px;transition:width .5s}
.top-lvl{font-size:12px;font-weight:800;color:var(--mid)}

/* ══ TASK ══ */
#task-screen{gap:12px;max-width:520px;width:100%;margin:0 auto}

.cat-pill{
  font-size:12px;font-weight:900;text-transform:uppercase;letter-spacing:1.5px;
  padding:7px 20px;border-radius:50px;color:var(--white);
  background:linear-gradient(135deg,var(--teal),var(--blue));
  box-shadow:0 3px 0 #0097A7; align-self:center; white-space:nowrap;
}
.cat-pill.hard{
  background:linear-gradient(135deg,var(--pink),var(--purple));
  box-shadow:0 3px 0 #7B1FA2;
}

.task-q{
  font-size:clamp(18px,4.8vw,24px); font-weight:900; text-align:center;
  line-height:1.4; color:var(--ink); max-width:500px;
}

.hint-box{
  background:#FFF8E1; border-left:4px solid var(--yellow); border-radius:0 12px 12px 0;
  padding:8px 14px; font-size:13px; font-weight:700; color:#795548;
  width:100%; max-width:520px;
}

.task-vis{
  background:var(--white); border-radius:24px; padding:20px 14px; width:100%;
  display:flex; align-items:center; justify-content:center; flex-wrap:wrap;
  box-shadow:0 4px 0 #E5E7EB; min-height:120px; gap:8px;
  border:3px solid #F0F4F8;
}

.opts{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%}
.opt{
  background:var(--white); border:3px solid #E5E7EB; border-radius:20px;
  padding:14px 8px; cursor:pointer; font-family:inherit;
  display:flex; align-items:center; justify-content:center; flex-direction:column;
  gap:5px; min-height:90px; font-weight:700; font-size:15px;
  transition:border-color .15s,transform .12s,box-shadow .15s;
  box-shadow:0 5px 0 #E5E7EB;
}
.opt:hover:not(:disabled){
  border-color:var(--orange); transform:translateY(-3px);
  box-shadow:0 8px 0 #FFA726;
}
.opt:disabled{cursor:default}
.opt.wrong{
  border-color:var(--red)!important; background:#FFEBEE;
  box-shadow:0 5px 0 #EF9A9A!important; animation:shake .4s;
}
.opt-txt{font-size:13px;color:var(--mid);font-weight:700;text-align:center;line-height:1.2;margin-top:2px}

.explain{
  background:#FFF9C4; border:3px solid var(--yellow); border-radius:18px;
  padding:12px 16px; font-size:14px; font-weight:700; color:#4E342E;
  width:100%; max-width:520px; display:none; line-height:1.5; text-align:center;
  box-shadow:0 4px 0 #FBC02D;
}
.explain.show{display:block}

/* ══ FEEDBACK ══ */
#fb{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);
  font-size:90px;z-index:300;pointer-events:none}
#fb.pop{animation:popIt .65s forwards}

/* ══ FINISH ══ */
#finish{justify-content:center;text-align:center;gap:18px;
  background:linear-gradient(180deg,#FFF9C4 0%,#FFFDE7 100%)}
.fin-mascot{font-size:96px;animation:bounce 2s ease-in-out infinite}
.fin-title{font-size:clamp(32px,8vw,54px);font-weight:900;line-height:1.1;color:var(--ink)}
.fin-title span{color:var(--pink)}
.fin-card{
  background:var(--white); border-radius:22px; padding:16px 24px;
  box-shadow:0 4px 16px rgba(0,0,0,.1); font-size:17px; font-weight:700; color:var(--mid);
}
.fin-stars{font-size:50px;letter-spacing:5px}
.btn-again{
  background:linear-gradient(135deg,var(--teal),var(--blue));
  color:var(--white); border:none; border-radius:50px; padding:16px 46px;
  font-size:22px; font-weight:900; font-family:inherit;
  cursor:pointer; box-shadow:0 6px 0 #00838F; transition:all .12s;
}
.btn-again:active{transform:translateY(5px);box-shadow:0 1px 0 #00838F}

#cv{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:200}

/* GRID */
.grid-wrap{display:flex;flex-direction:column;gap:2px}
.grid-row{display:flex;gap:2px}
.gcell{width:40px;height:40px;border-radius:8px;border:2px solid #E5E7EB;
  display:flex;align-items:center;justify-content:center;font-size:18px;background:#F9FAFB}
.gcell.start{background:#FFF9C4;border-color:var(--yellow)}
.gcell.end{background:#E8F5E9;border-color:var(--green)}
.gcell.path{background:#E3F2FD;border-color:var(--blue)}

@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-10px)}75%{transform:translateX(10px)}}
@keyframes popIt{
  0%{transform:translate(-50%,-50%)scale(0);opacity:0}
  50%{transform:translate(-50%,-50%)scale(1.3);opacity:1}
  80%{transform:translate(-50%,-50%)scale(.9);opacity:1}
  100%{transform:translate(-50%,-50%)scale(1.2);opacity:0}
}
</style>
</head>
<body>

<div id="animalbg"></div>

<!-- WELCOME -->
<div id="welcome" class="screen active">
  <div class="w-mascots">🐱🐶🐰🐻</div>
  <div class="w-title"><span class="t1">Весёлые</span><br><span class="t2">животные</span></div>
  <div class="badge-lvl">32 задания · 2 уровня сложности</div>
  <div class="w-animals-row">🦊🐼🐨🐯🦁🐸🐷🐮</div>
  <div class="w-sub">Помогай животным решать задачки! Чем дальше — тем сложнее 🧠</div>
  <button class="btn-start" onclick="startGame()">Начать! 🚀</button>
</div>

<!-- TASK -->
<div id="task-screen" class="screen">
  <div class="top-bar">
    <div class="top-row">
      <div class="top-lbl" id="pl">Задание 1 из 32</div>
      <div class="top-score" id="sb">⭐ 0</div>
    </div>
    <div class="prog-track"><div class="prog-fill" id="pf" style="width:0%"></div></div>
    <div class="top-lvl" id="lvl">⭐ Уровень 1</div>
  </div>
  <div class="cat-pill" id="cp"></div>
  <div class="task-q" id="tq"></div>
  <div class="hint-box" id="th" style="display:none"></div>
  <div class="task-vis" id="tv"></div>
  <div class="opts" id="op"></div>
  <div class="explain" id="ex"></div>
</div>

<!-- FINISH -->
<div id="finish" class="screen">
  <canvas id="cv"></canvas>
  <div class="fin-mascot" id="fi">🏆</div>
  <div class="fin-title" id="ft">Молодец!</div>
  <div class="fin-card" id="fs"></div>
  <div class="fin-stars" id="fst"></div>
  <button class="btn-again" onclick="restart()">Ещё раз! 🔄</button>
</div>

<div id="fb"></div>

<script>
/* ── FLOATING ANIMALS ── */
(function(){
  const bg=document.getElementById('animalbg');
  const animals=['🐱','🐶','🐰','🐻','🦊','🐼','⭐','🌸','🍀','🌟'];
  for(let i=0;i<20;i++){
    const el=document.createElement('span');
    el.className='float-animal';
    el.textContent=animals[i%animals.length];
    el.style.left=Math.random()*94+'%';
    el.style.top=Math.random()*95+'%';
    el.style.fontSize=(20+Math.random()*28)+'px';
    el.style.animationDuration=(4+Math.random()*6)+'s';
    el.style.animationDelay=(-Math.random()*7)+'s';
    bg.appendChild(el);
  }
})();

/* ── SVG helpers ── */
const SZ=56;
const circle  =(c,s=SZ)=>`<svg width="${s}" height="${s}"><circle cx="${s/2}" cy="${s/2}" r="${s/2-3}" fill="${c}" stroke="#fff" stroke-width="2.5"/></svg>`;
const square  =(c,s=SZ)=>`<svg width="${s}" height="${s}"><rect x="4" y="4" width="${s-8}" height="${s-8}" rx="9" fill="${c}" stroke="#fff" stroke-width="2.5"/></svg>`;
const tri     =(c,s=SZ)=>{const p=`${s/2},4 ${s-4},${s-4} 4,${s-4}`;return`<svg width="${s}" height="${s}"><polygon points="${p}" fill="${c}" stroke="#fff" stroke-width="2.5"/></svg>`};
const pentagon=(c,s=SZ)=>{const pts=[],cx=s/2,cy=s/2;for(let i=0;i<5;i++){const a=(i*72-90)*Math.PI/180;pts.push(`${cx+(s/2-4)*Math.cos(a)},${cy+(s/2-4)*Math.sin(a)}`)}return`<svg width="${s}" height="${s}"><polygon points="${pts.join(' ')}" fill="${c}" stroke="#fff" stroke-width="2.5"/></svg>`};
const num=(n,c='#2D2D2D')=>`<span style="font-size:48px;font-weight:900;color:${c};font-family:inherit">${n}</span>`;
const big=(s,sz=46)=>`<span style="font-size:${sz}px;line-height:1.1">${s}</span>`;
const lbl=(t)=>`<div class="opt-txt">${t}</div>`;

function makeGrid(rows,cols,startR,startC,endR,endC,paths=[]){
  let h='<div class="grid-wrap">';
  for(let r=0;r<rows;r++){h+='<div class="grid-row">';
    for(let c=0;c<cols;c++){
      const isS=r===startR&&c===startC,isE=r===endR&&c===endC;
      const isP=paths.some(p=>p[0]===r&&p[1]===c);
      const cls=isS?'gcell start':isE?'gcell end':isP?'gcell path':'gcell';
      const icon=isS?'🐱':isE?'🐟':'';
      h+=`<div class="${cls}">${icon}</div>`;
    }h+='</div>';
  }h+='</div>';return h;
}

/* ── TASKS ── */
const TASKS=[
  {
    cat:'🔢 Сравни',
    q:'Какая группа БОЛЬШЕ — красные или синие?',
    hint:'Считай внимательно!',
    vis:`<div style="display:flex;flex-direction:column;gap:10px;align-items:center">
           <div style="display:flex;gap:4px;align-items:center">${circle('#EF5350',34).repeat(7)}<span style="font-size:13px;font-weight:900;color:#6B7280;margin-left:6px">красные</span></div>
           <div style="display:flex;gap:4px;align-items:center">${circle('#42A5F5',34).repeat(8)}<span style="font-size:13px;font-weight:900;color:#6B7280;margin-left:6px">синие</span></div>
         </div>`,
    opts:[
      {v:circle('#EF5350',48)+lbl('Красных больше (7)'),ok:false},
      {v:circle('#42A5F5',48)+lbl('Синих больше (8)'),ok:true},
      {v:'<span style="font-size:26px;font-weight:900">=</span>'+lbl('Их поровну'),ok:false},
      {v:big('🤷',36)+lbl('Не знаю'),ok:false},
    ],
    explain:'Красных 7, синих 8. 8 > 7, значит синих больше!'
  },
  {
    cat:'🔢 Числа',
    q:'Какое число — ЛИШНЕЕ? Найди то, которое не похоже на остальные!',
    hint:'Почему три числа «дружат», а одно — нет?',
    vis:`<div style="display:flex;gap:14px;flex-wrap:wrap;justify-content:center">
           ${[2,4,7,6].map(n=>`<div style="background:#FFF3E0;border-radius:14px;padding:10px 20px;font-size:44px;font-weight:900;color:#2D2D2D">${n}</div>`).join('')}
         </div>`,
    opts:[{v:num(2),ok:false},{v:num(4),ok:false},{v:num(7),ok:true},{v:num(6),ok:false}],
    explain:'2, 4, 6 — чётные. А 7 — нечётное, поэтому оно лишнее!'
  },
  {
    cat:'➕ Состав числа',
    q:'У котика было 9 рыбок. 4 он уже съел. Сколько осталось? 🐱',
    hint:'',
    vis:`<div style="display:flex;align-items:center;gap:12px;justify-content:center;flex-wrap:wrap">
           <div style="background:#FFF9C4;border-radius:14px;padding:12px;font-size:13px;font-weight:900;text-align:center;color:#795548">Было<br><span style="font-size:40px">9🐟</span></div>
           <span style="font-size:30px;font-weight:900;color:#6B7280">−</span>
           <div style="background:#FFEBEE;border-radius:14px;padding:12px;font-size:13px;font-weight:900;text-align:center;color:#C62828">Съел<br><span style="font-size:40px">4🐟</span></div>
           <span style="font-size:30px;font-weight:900;color:#6B7280">=</span>
           <span style="font-size:44px;font-weight:900;color:#FF6B9D">?</span>
         </div>`,
    opts:[{v:num(4),ok:false},{v:num(6),ok:false},{v:num(5),ok:true},{v:num(3),ok:false}],
    explain:'9 − 4 = 5. Осталось 5 рыбок!'
  },
  {
    cat:'🔢 Порядковый счёт',
    q:'Зайка стоит ЧЕТВЁРТЫМ слева. Какой по счёту стоит котик?',
    hint:'Считай слева направо!',
    vis:`<div style="display:flex;gap:6px;align-items:flex-end;justify-content:center;flex-wrap:wrap">
           ${['🐶','🐸','🐻','🐰','🐱','🦊'].map((a,i)=>`
             <div style="text-align:center">
               <div style="font-size:36px">${a}</div>
               <div style="font-size:12px;font-weight:900;color:${a==='🐰'?'#FF6B9D':'#9CA3AF'};margin-top:2px">${i+1}</div>
             </div>`).join('')}
         </div>`,
    opts:[{v:num(4)+lbl('Четвёртый'),ok:false},{v:num(5)+lbl('Пятый'),ok:true},{v:num(6)+lbl('Шестой'),ok:false},{v:num(3)+lbl('Третий'),ok:false}],
    explain:'🐶-1, 🐸-2, 🐻-3, 🐰-4 (зайка), 🐱-5. Котик стоит ПЯТЫМ!'
  },
  {
    cat:'📝 Задача',
    q:'У Маши было 6 конфет. Она дала 2 Пете и получила 3 от мамы. Сколько конфет стало?',
    hint:'Это два действия! Сначала вычти, потом прибавь.',
    vis:`<div style="display:flex;flex-direction:column;align-items:center;gap:10px;font-size:14px;font-weight:700;color:#475569">
           <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:center">
             <div style="background:#EDE9FE;border-radius:10px;padding:8px 14px">Было: <b style="color:#7C3AED;font-size:20px">6</b> 🍬</div>
             <span>→</span>
             <div style="background:#FFEBEE;border-radius:10px;padding:8px 14px">Дала: <b style="color:#C62828;font-size:20px">2</b> 🍬</div>
             <span>→</span>
             <div style="background:#E8F5E9;border-radius:10px;padding:8px 14px">Мама: <b style="color:#2E7D32;font-size:20px">3</b> 🍬</div>
           </div>
           <div style="font-size:22px;font-weight:900;color:#FF6B9D">6 − 2 + 3 = ?</div>
         </div>`,
    opts:[{v:num(7),ok:true},{v:num(8),ok:false},{v:num(5),ok:false},{v:num(9),ok:false}],
    explain:'6 − 2 = 4, потом 4 + 3 = 7. Стало 7 конфет!'
  },
  {
    cat:'➕ Состав числа',
    q:'Найди пропущенное число! 8 = 3 + ?',
    hint:'Из каких двух чисел складывается 8?',
    vis:`<div style="display:flex;align-items:center;gap:12px;justify-content:center">
           <div style="display:flex;gap:3px">${circle('#42A5F5',30).repeat(8)}</div>
           <span style="font-size:28px;font-weight:900;color:#6B7280">=</span>
           <div style="display:flex;flex-direction:column;gap:4px;align-items:center">
             <div style="display:flex;gap:3px">${circle('#FF6B9D',30).repeat(3)}</div>
             <span style="font-size:13px;font-weight:700;color:#9CA3AF">3</span>
           </div>
           <span style="font-size:28px;font-weight:900;color:#6B7280">+</span>
           <div style="font-size:44px;font-weight:900;color:#FF6B9D">?</div>
         </div>`,
    opts:[{v:num(4),ok:false},{v:num(6),ok:false},{v:num(5),ok:true},{v:num(3),ok:false}],
    explain:'8 = 3 + 5. Проверка: 3 + 5 = 8 ✓'
  },
  {
    cat:'📐 Геометрия',
    q:'Какая фигура ЛИШНЯЯ? Подумай, чем она отличается!',
    hint:'Одна фигура совсем другая по важному признаку',
    vis:`<div style="display:flex;gap:16px;align-items:center;justify-content:center;flex-wrap:wrap">
           <div style="text-align:center">${tri('#42A5F5',60)}<div style="font-size:12px;font-weight:700;color:#6B7280;margin-top:4px">3 угла</div></div>
           <div style="text-align:center">${square('#42A5F5',60)}<div style="font-size:12px;font-weight:700;color:#6B7280;margin-top:4px">4 угла</div></div>
           <div style="text-align:center">${circle('#42A5F5',60)}<div style="font-size:12px;font-weight:700;color:#6B7280;margin-top:4px">? углов</div></div>
           <div style="text-align:center">${pentagon('#42A5F5',60)}<div style="font-size:12px;font-weight:700;color:#6B7280;margin-top:4px">5 углов</div></div>
         </div>`,
    opts:[
      {v:tri('#42A5F5',48)+lbl('Треугольник'),ok:false},
      {v:square('#42A5F5',48)+lbl('Квадрат'),ok:false},
      {v:circle('#42A5F5',48)+lbl('Круг'),ok:true},

/* ── ENGINE ── */
let tasks=[],idx=0,score=0,answered=false;
const shuffle=a=>[...a].sort(()=>Math.random()-.5);

function startGame(){
  tasks=[...shuffle(TASKS),...TASKS_HARD];
  idx=0;score=0;answered=false;
  show('task-screen');render();
}
function restart(){const c=document.getElementById('cv').getContext('2d');c.clearRect(0,0,9999,9999);startGame();}
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}

function render(){
  if(idx>=tasks.length){finish();return;}
  answered=false;
  document.getElementById('ex').className='explain';
  const t=tasks[idx],tot=tasks.length;
  document.getElementById('pf').style.width=(idx/tot*100)+'%';
  document.getElementById('pl').textContent=`Задание ${idx+1} из ${tot}`;
  document.getElementById('sb').textContent=`⭐ ${score}`;
  const isHard=idx>=TASKS.length;
  document.getElementById('lvl').textContent=isHard
    ?`🔥 Уровень 2 — Задание ${idx-TASKS.length+1} из ${TASKS_HARD.length}`
    :`⭐ Уровень 1 — Задание ${idx+1} из ${TASKS.length}`;
  const pill=document.getElementById('cp');
  pill.textContent=t.cat;
  pill.className='cat-pill'+(isHard?' hard':'');
  document.getElementById('tq').textContent=t.q;
  const hintEl=document.getElementById('th');
  if(t.hint){hintEl.textContent='💡 '+t.hint;hintEl.style.display='block';}
  else{hintEl.style.display='none';}
  document.getElementById('tv').innerHTML=t.vis;
  const sh=shuffle(t.opts);
  const grid=document.getElementById('op');
  grid.innerHTML='';
  sh.forEach(opt=>{
    const btn=document.createElement('button');
    btn.className='opt';
    btn.innerHTML=opt.v;
    btn.onclick=()=>pick(btn,opt.ok,grid,t.explain);
    grid.appendChild(btn);
  });
}

function pick(btn,ok,grid,explain){
  if(answered)return;
  answered=true;
  grid.querySelectorAll('.opt').forEach(b=>b.disabled=true);
  if(ok){score++;fb('🎉');}
  else{btn.classList.add('wrong');fb('😮');}
  if(explain){const ex=document.getElementById('ex');ex.textContent='💡 '+explain;ex.className='explain show';}
  setTimeout(()=>{idx++;render();},2600);
}

function fb(e){
  const el=document.getElementById('fb');
  el.textContent=e;el.classList.remove('pop');void el.offsetWidth;el.classList.add('pop');
  setTimeout(()=>el.classList.remove('pop'),700);
}

function finish(){
  show('finish');
  const tot=tasks.length,pct=score/tot;
  const fi=document.getElementById('fi');
  if(pct>=.87){fi.textContent='🏆';document.getElementById('ft').innerHTML='<span>Умница!</span> Так держать!';}
  else if(pct>=.67){fi.textContent='🌟';document.getElementById('ft').innerHTML='<span>Молодец!</span>';}
  else{fi.textContent='🐱';document.getElementById('ft').innerHTML='Тренируемся <span>дальше!</span>';}
  document.getElementById('fs').textContent=`Правильных ответов: ${score} из ${tot}`;
  document.getElementById('fst').textContent=pct>=.87?'⭐⭐⭐⭐⭐':pct>=.67?'⭐⭐⭐⭐':pct>=.47?'⭐⭐⭐':'⭐⭐';
  if(pct>=.5)confetti();
}

function confetti(){
  const cv=document.getElementById('cv');
  const ctx=cv.getContext('2d');
  cv.width=window.innerWidth;cv.height=window.innerHeight;
  const C=['#FF6B9D','#FF9B3C','#FFD93D','#4CAF50','#42A5F5','#26C6DA','#AB47BC'];
  const shapes=['🐱','🐶','🐰','⭐','🌸','🎉'];
  const ps=Array.from({length:90},()=>({
    x:Math.random()*cv.width,y:Math.random()*-cv.height,
    s:Math.random()*9+5,c:C[Math.floor(Math.random()*C.length)],
    sp:Math.random()*3.5+2,a:Math.random()*Math.PI*2,spin:(Math.random()-.5)*.2,
    isShape:Math.random()>.55,shape:shapes[Math.floor(Math.random()*shapes.length)]
  }));
  let fr;
  const draw=()=>{
    ctx.clearRect(0,0,cv.width,cv.height);
    ps.forEach(p=>{
      ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.a);
      if(p.isShape){ctx.font=`${p.s*3}px serif`;ctx.fillText(p.shape,-p.s*1.5,-p.s);}
      else{ctx.fillStyle=p.c;ctx.fillRect(-p.s/2,-p.s/2,p.s,p.s);}
      ctx.restore();
      p.y+=p.sp;p.a+=p.spin;if(p.y>cv.height)p.y=-20;
    });
    fr=requestAnimationFrame(draw);
  };
  draw();setTimeout(()=>{cancelAnimationFrame(fr);ctx.clearRect(0,0,cv.width,cv.height);},4500);
}
