<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Ломоносовская школа — Кристина</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --pink:#FF6B9D; --orange:#FF9B3C; --yellow:#FFD93D;
  --green:#4CAF50; --teal:#26C6DA; --blue:#42A5F5;
  --purple:#AB47BC; --red:#EF5350; --lime:#8BC34A;
  --bg:#F0FFF4; --ink:#1B2D1B; --mid:#5A7A5A; --white:#FFFFFF;
}
body{font-family:'Nunito','Arial Rounded MT Bold',Arial,sans-serif;background:var(--bg);min-height:100vh;color:var(--ink);overflow-x:hidden}

.float-el{position:fixed;opacity:.1;pointer-events:none;z-index:0;animation:flt linear infinite}
@keyframes flt{0%{transform:translateY(0) rotate(-8deg)}50%{transform:translateY(-18px) rotate(8deg)}100%{transform:translateY(0) rotate(-8deg)}}

.screen{display:none;flex-direction:column;align-items:center;min-height:100vh;padding:16px 14px 50px;position:relative;z-index:1}
.screen.active{display:flex}

/* WELCOME */
#welcome{justify-content:center;text-align:center;gap:14px;
  background:linear-gradient(180deg,#E8F5E9 0%,#F0FFF4 100%)}
.w-icon{font-size:72px;animation:bou 2s ease-in-out infinite}
@keyframes bou{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
.w-title{font-size:clamp(28px,7vw,48px);font-weight:900;line-height:1.1;color:var(--ink)}
.w-title .hi{color:var(--pink)}
.w-title .lo{color:var(--green)}
.w-badge{background:linear-gradient(135deg,var(--green),var(--teal));color:#fff;font-size:13px;font-weight:900;padding:7px 22px;border-radius:50px;letter-spacing:.5px}
.w-info{background:#fff;border-radius:18px;padding:14px 20px;font-size:15px;font-weight:700;color:var(--mid);box-shadow:0 3px 12px rgba(0,0,0,.08);max-width:320px;line-height:1.6}
.w-animals{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;font-size:36px;background:#fff;border-radius:18px;padding:12px 18px;box-shadow:0 3px 12px rgba(0,0,0,.08);max-width:300px}
.btn-start{background:linear-gradient(135deg,var(--green),var(--lime));color:#fff;border:none;border-radius:50px;padding:18px 54px;font-size:24px;font-weight:900;font-family:inherit;cursor:pointer;box-shadow:0 6px 0 #388E3C;transition:all .12s;margin-top:4px}
.btn-start:active{transform:translateY(5px);box-shadow:0 1px 0 #388E3C}

/* TOP BAR */
.top-bar{width:100%;max-width:520px;margin-bottom:12px;background:#fff;border-radius:22px;padding:12px 16px;box-shadow:0 4px 14px rgba(0,0,0,.08);display:flex;flex-direction:column;gap:7px}
.top-row{display:flex;justify-content:space-between;align-items:center}
.top-lbl{font-size:14px;font-weight:800;color:var(--ink)}
.top-score{background:linear-gradient(135deg,var(--yellow),var(--orange));border-radius:12px;padding:4px 14px;font-size:14px;font-weight:900;color:var(--ink)}
.prog-track{width:100%;height:16px;background:#E8F5E9;border-radius:50px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--green),var(--teal));border-radius:50px;transition:width .5s}
.top-num{font-size:12px;font-weight:800;color:var(--mid)}

/* TASK */
#task-screen{gap:12px;max-width:520px;width:100%;margin:0 auto}
.cat-pill{font-size:12px;font-weight:900;text-transform:uppercase;letter-spacing:1.5px;padding:7px 20px;border-radius:50px;color:#fff;background:linear-gradient(135deg,var(--green),var(--teal));box-shadow:0 3px 0 #0097A7;align-self:center;white-space:nowrap}
.task-q{font-size:clamp(18px,4.8vw,24px);font-weight:900;text-align:center;line-height:1.4;color:var(--ink);max-width:500px}
.hint-box{background:#FFFDE7;border-left:4px solid var(--yellow);border-radius:0 12px 12px 0;padding:8px 14px;font-size:13px;font-weight:700;color:#795548;width:100%;max-width:520px}
.task-vis{background:#fff;border-radius:24px;padding:20px 14px;width:100%;display:flex;align-items:center;justify-content:center;flex-wrap:wrap;box-shadow:0 4px 0 #C8E6C9;min-height:120px;gap:8px;border:3px solid #E8F5E9}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%}
.opt{background:#fff;border:3px solid #DCEDC8;border-radius:20px;padding:14px 8px;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:5px;min-height:90px;font-weight:700;font-size:15px;transition:border-color .15s,transform .12s,box-shadow .15s;box-shadow:0 5px 0 #DCEDC8}
.opt:hover:not(:disabled){border-color:var(--orange);transform:translateY(-3px);box-shadow:0 8px 0 #FFA726}
.opt:disabled{cursor:default}
.opt.wrong{border-color:var(--red)!important;background:#FFEBEE;box-shadow:0 5px 0 #FFCDD2!important;animation:shake .4s}
.opt-txt{font-size:13px;color:var(--mid);font-weight:700;text-align:center;line-height:1.2;margin-top:2px}
.explain{background:#FFFDE7;border:3px solid var(--yellow);border-radius:18px;padding:12px 16px;font-size:14px;font-weight:700;color:#4E342E;width:100%;max-width:520px;display:none;line-height:1.5;text-align:center;box-shadow:0 4px 0 #FBC02D}
.explain.show{display:block}

/* FEEDBACK */
#fb{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);font-size:90px;z-index:300;pointer-events:none}
#fb.pop{animation:popIt .65s forwards}

/* FINISH */
#finish{justify-content:center;text-align:center;gap:18px;background:linear-gradient(180deg,#E8F5E9 0%,#F0FFF4 100%)}
.fin-icon{font-size:96px;animation:bou 2s ease-in-out infinite}
.fin-title{font-size:clamp(32px,8vw,52px);font-weight:900;line-height:1.1;color:var(--ink)}
.fin-title span{color:var(--green)}
.fin-card{background:#fff;border-radius:22px;padding:16px 24px;box-shadow:0 4px 14px rgba(0,0,0,.08);font-size:17px;font-weight:700;color:var(--mid)}
.fin-stars{font-size:50px;letter-spacing:5px}
.btn-again{background:linear-gradient(135deg,var(--pink),var(--orange));color:#fff;border:none;border-radius:50px;padding:16px 46px;font-size:22px;font-weight:900;font-family:inherit;cursor:pointer;box-shadow:0 6px 0 #C2185B;transition:all .12s}
.btn-again:active{transform:translateY(5px);box-shadow:0 1px 0 #C2185B}
#cv{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:200}

/* GRID */
.grid-wrap{display:flex;flex-direction:column;gap:3px}
.grid-row{display:flex;gap:3px}
.gcell{width:42px;height:42px;border-radius:8px;border:2px solid #C8E6C9;display:flex;align-items:center;justify-content:center;font-size:18px;background:#F1F8E9}
.gcell.start{background:#FFF9C4;border-color:#FFD93D}
.gcell.end{background:#E8F5E9;border-color:#4CAF50}

@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-10px)}75%{transform:translateX(10px)}}
@keyframes popIt{0%{transform:translate(-50%,-50%)scale(0);opacity:0}50%{transform:translate(-50%,-50%)scale(1.3);opacity:1}80%{transform:translate(-50%,-50%)scale(.9);opacity:1}100%{transform:translate(-50%,-50%)scale(1.2);opacity:0}}
</style>
</head>
<body>
<div id="floatbg"></div>

<!-- WELCOME -->
<div id="welcome" class="screen active">
  <div class="w-icon">🌿</div>
  <div class="w-title"><span class="lo">Ломоносовская</span><br><span class="hi">школа</span></div>
  <div class="w-badge">🎓 Средний уровень · 40 заданий</div>
  <div class="w-animals">🐱🐶🦊🐼🐨🐯🦁🐸</div>
  <div class="w-info">Задания по программе подготовки к школе для детей 6–7 лет. Не слишком просто, не слишком сложно — самый раз! 🌟</div>
  <button class="btn-start" onclick="startGame()">Поехали! 🚀</button>
</div>

<!-- TASK -->
<div id="task-screen" class="screen">
  <div class="top-bar">
    <div class="top-row">
      <div class="top-lbl" id="pl">Задание 1 из 40</div>
      <div class="top-score" id="sb">⭐ 0</div>
    </div>
    <div class="prog-track"><div class="prog-fill" id="pf" style="width:0%"></div></div>
    <div class="top-num" id="pn">Блок 1 из 8</div>
  </div>
  <div class="cat-pill" id="cp"></div>
  <div class="task-q" id="tq"></div>
  <div class="hint-box" id="th" style="display:none"></div>
  <div class="task-vis" id="tv"></div>
  <div class="opts" id="op"></div>
  <div class="explain" id="ex"></div>
</div>

<!-- FINISH -->
<div id="finish" class="screen">
  <canvas id="cv"></canvas>
  <div class="fin-icon" id="fi">🏆</div>
  <div class="fin-title" id="ft">Молодец!</div>
  <div class="fin-card" id="fs"></div>
  <div class="fin-stars" id="fst"></div>
  <button class="btn-again" onclick="restart()">Ещё раз! 🔄</button>
</div>
<div id="fb"></div>

<script>
/* ── ФОНОВЫЕ ЭЛЕМЕНТЫ ── */
(function(){
  const bg=document.getElementById('floatbg');
  const items=['🌿','🍀','⭐','🌸','🐾','🌟','🍃'];
  for(let i=0;i<18;i++){
    const el=document.createElement('span');
    el.className='float-el';
    el.textContent=items[i%items.length];
    el.style.cssText=`left:${Math.random()*94}%;top:${Math.random()*95}%;font-size:${18+Math.random()*24}px;animation-duration:${4+Math.random()*6}s;animation-delay:${-Math.random()*7}s`;
    bg.appendChild(el);
  }
})();

/* ── SVG ── */
const SZ=56;
const C=(c,s=SZ)=>`<svg width="${s}" height="${s}"><circle cx="${s/2}" cy="${s/2}" r="${s/2-3}" fill="${c}" stroke="#fff" stroke-width="2.5"/></svg>`;
const S=(c,s=SZ)=>`<svg width="${s}" height="${s}"><rect x="4" y="4" width="${s-8}" height="${s-8}" rx="9" fill="${c}" stroke="#fff" stroke-width="2.5"/></svg>`;
const T=(c,s=SZ)=>{const p=`${s/2},4 ${s-4},${s-4} 4,${s-4}`;return`<svg width="${s}" height="${s}"><polygon points="${p}" fill="${c}" stroke="#fff" stroke-width="2.5"/></svg>`};
const Pent=(c,s=SZ)=>{const pts=[],cx=s/2,cy=s/2;for(let i=0;i<5;i++){const a=(i*72-90)*Math.PI/180;pts.push(`${cx+(s/2-4)*Math.cos(a)},${cy+(s/2-4)*Math.sin(a)}`)}return`<svg width="${s}" height="${s}"><polygon points="${pts.join(' ')}" fill="${c}" stroke="#fff" stroke-width="2.5"/></svg>`};
const n=(v,c='#1B2D1B')=>`<span style="font-size:48px;font-weight:900;color:${c};font-family:inherit">${v}</span>`;
const e=(s,sz=46)=>`<span style="font-size:${sz}px;line-height:1.1">${s}</span>`;
const L=(t)=>`<div class="opt-txt">${t}</div>`;
const box=(bg,content)=>`<div style="background:${bg};border-radius:14px;padding:12px 16px;text-align:center">${content}</div>`;

function grd(rows,cols,sR,sC,eR,eC){
  let h='<div class="grid-wrap">';
  for(let r=0;r<rows;r++){h+='<div class="grid-row">';
    for(let c=0;c<cols;c++){
      const isS=r===sR&&c===sC,isE=r===eR&&c===eC;
      h+=`<div class="${isS?'gcell start':isE?'gcell end':'gcell'}">${isS?'🐱':isE?'🐟':''}</div>`;
    }h+='</div>';}
  h+='</div>';return h;
}

/* ══════════════════════════════════
   40 ЗАДАНИЙ СРЕДНЕГО УРОВНЯ
   (Ломоносовская школа, 6–7 лет)
══════════════════════════════════ */
const TASKS=[

/* ─── БЛОК 1: СЧЁТ И ЧИСЛА ─── */
{
  cat:'🔢 Счёт',
  q:'Посчитай котят. Сколько их?',
  hint:'',
  vis:`<div style="display:flex;gap:6px;flex-wrap:wrap;justify-content:center;font-size:40px">
         🐱🐱🐱🐱🐱🐱🐱
       </div>`,
  opts:[{v:n(6)+L('6'),ok:false},{v:n(7)+L('7'),ok:true},{v:n(8)+L('8'),ok:false},{v:n(5)+L('5'),ok:false}],
  explain:'Считаем: 1-2-3-4-5-6-7. Всего 7 котят!'
},
{
  cat:'🔢 Счёт',
  q:'Какое число больше?',
  hint:'',
  vis:`<div style="display:flex;align-items:center;gap:20px;justify-content:center">
         <div style="background:#E8F5E9;border-radius:14px;padding:14px 22px;font-size:52px;font-weight:900;color:#1B2D1B">14</div>
         <span style="font-size:30px">или</span>
         <div style="background:#E3F2FD;border-radius:14px;padding:14px 22px;font-size:52px;font-weight:900;color:#1B2D1B">9</div>
       </div>`,
  opts:[{v:n(14)+L('14 больше'),ok:true},{v:n(9)+L('9 больше'),ok:false},{v:'<span style="font-size:28px;font-weight:900">=</span>'+L('Они равны'),ok:false},{v:e('🤷',34)+L('Не знаю'),ok:false}],
  explain:'14 больше 9. После 10 числа становятся больше однозначных!'
},
{
  cat:'🔢 Счёт',
  q:'Какое число стоит МЕЖДУ 7 и 9?',
  hint:'Числа идут по порядку',
  vis:`<div style="display:flex;align-items:center;gap:10px;justify-content:center">
         <div style="background:#E8F5E9;border-radius:12px;padding:12px 18px;font-size:44px;font-weight:900">7</div>
         <span style="font-size:34px;font-weight:900;color:#FF6B9D">→ ? →</span>
         <div style="background:#E8F5E9;border-radius:12px;padding:12px 18px;font-size:44px;font-weight:900">9</div>
       </div>`,
  opts:[{v:n(6),ok:false},{v:n(10),ok:false},{v:n(8),ok:true},{v:n(5),ok:false}],
  explain:'7, 8, 9 — числа идут по порядку. Между 7 и 9 стоит 8!'
},
{
  cat:'🔢 Счёт',
  q:'Считаем от 5 до 1. Что идёт после 3?',
  hint:'Считаем НАЗАД!',
  vis:`<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:center">
         ${[5,4,3,'?',1].map(x=>`<div style="background:${x==='?'?'#FCE4EC':'#E8F5E9'};border-radius:12px;padding:10px 16px;font-size:36px;font-weight:900;color:${x==='?'?'#FF6B9D':'#1B2D1B'};border:${x==='?'?'3px dashed #FF6B9D':'none'}">${x}</div>`).join('<span style="font-size:22px;color:#9E9E9E">→</span>')}
       </div>`,
  opts:[{v:n(4),ok:false},{v:n(2),ok:true},{v:n(1),ok:false},{v:n(0),ok:false}],
  explain:'5, 4, 3, 2, 1 — считаем назад. После 3 идёт 2!'
},
{
  cat:'🔢 Счёт',
  q:'Расставь числа по порядку от маленького к большому. Какое число ТРЕТЬЕ?',
  hint:'Сначала найди самое маленькое',
  vis:`<div style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center">
         ${[12,5,8,17].map(x=>`<div style="background:#E8F5E9;border-radius:14px;padding:12px 20px;font-size:42px;font-weight:900">${x}</div>`).join('')}
       </div>`,
  opts:[{v:n(5),ok:false},{v:n(8),ok:false},{v:n(12),ok:true},{v:n(17),ok:false}],
  explain:'По порядку: 5, 8, 12, 17. Третье число — 12!'
},

/* ─── БЛОК 2: СЛОЖЕНИЕ И ВЫЧИТАНИЕ ─── */
{
  cat:'➕ Считаем',
  q:'Щенок принёс 4 косточки, потом ещё 3. Сколько косточек стало?',
  hint:'',
  vis:`<div style="display:flex;align-items:center;gap:10px;justify-content:center;flex-wrap:wrap">
         <div style="background:#FFF9C4;border-radius:12px;padding:10px 14px;font-size:13px;font-weight:900;text-align:center;color:#795548">Было<br><span style="font-size:38px">🦴🦴🦴🦴</span></div>
         <span style="font-size:28px;font-weight:900;color:#5A7A5A">+</span>
         <div style="background:#E8F5E9;border-radius:12px;padding:10px 14px;font-size:13px;font-weight:900;text-align:center;color:#2E7D32">Принёс<br><span style="font-size:38px">🦴🦴🦴</span></div>
         <span style="font-size:28px;font-weight:900;color:#5A7A5A">=</span>
         <span style="font-size:44px;font-weight:900;color:#FF6B9D">?</span>
       </div>`,
  opts:[{v:n(6),ok:false},{v:n(7),ok:true},{v:n(8),ok:false},{v:n(5),ok:false}],
  explain:'4 + 3 = 7 косточек!'
},
{
  cat:'➕ Считаем',
  q:'На дереве сидело 8 птичек. 3 улетели. Сколько осталось?',
  hint:'',
  vis:`<div style="display:flex;align-items:center;gap:10px;justify-content:center;flex-wrap:wrap">
         <div style="background:#E3F2FD;border-radius:12px;padding:10px 14px;text-align:center;font-size:13px;font-weight:900;color:#1565C0">Было<br><span style="font-size:34px">🐦🐦🐦🐦🐦🐦🐦🐦</span></div>
         <span style="font-size:28px;font-weight:900;color:#5A7A5A">−</span>
         <div style="background:#FFEBEE;border-radius:12px;padding:10px 14px;text-align:center;font-size:13px;font-weight:900;color:#C62828">Улетели<br><span style="font-size:34px">🐦🐦🐦</span></div>
         <span style="font-size:28px;font-weight:900;color:#5A7A5A">=</span>
         <span style="font-size:44px;font-weight:900;color:#FF6B9D">?</span>
       </div>`,
  opts:[{v:n(4),ok:false},{v:n(6),ok:false},{v:n(5),ok:true},{v:n(3),ok:false}],
  explain:'8 − 3 = 5. Осталось 5 птичек!'
},
{
  cat:'➕ Считаем',
  q:'Котик поймал 6 рыбок. Съел 2. Потом поймал ещё 1. Сколько рыбок у котика?',
  hint:'Делай по шагам: сначала вычти, потом прибавь',
  vis:`<div style="display:flex;flex-direction:column;gap:8px;align-items:center;font-size:14px;font-weight:700">
         <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:center">
           ${box('#E3F2FD','Поймал<br><b style="font-size:22px;color:#1565C0">6 🐟</b>')}
           <span style="font-size:22px">−</span>
           ${box('#FFEBEE','Съел<br><b style="font-size:22px;color:#C62828">2 🐟</b>')}
           <span style="font-size:22px">+</span>
           ${box('#E8F5E9','Поймал<br><b style="font-size:22px;color:#2E7D32">1 🐟</b>')}
           <span style="font-size:22px">= ?</span>
         </div>
       </div>`,
  opts:[{v:n(4),ok:false},{v:n(6),ok:false},{v:n(5),ok:true},{v:n(7),ok:false}],
  explain:'6 − 2 = 4, потом 4 + 1 = 5 рыбок!'
},
{
  cat:'➕ Считаем',
  q:'Найди пропущенное число: 5 + ? = 9',
  hint:'Думай наоборот: 9 минус 5',
  vis:`<div style="display:flex;align-items:center;gap:14px;justify-content:center">
         <div style="background:#E8F5E9;border-radius:14px;padding:14px 20px;font-size:44px;font-weight:900">5</div>
         <span style="font-size:34px;font-weight:900;color:#5A7A5A">+</span>
         <div style="background:#FCE4EC;border-radius:14px;padding:14px 20px;font-size:44px;font-weight:900;color:#FF6B9D;border:3px dashed #FF6B9D">?</div>
         <span style="font-size:34px;font-weight:900;color:#5A7A5A">=</span>
         <div style="background:#E8F5E9;border-radius:14px;padding:14px 20px;font-size:44px;font-weight:900">9</div>
       </div>`,
  opts:[{v:n(3),ok:false},{v:n(5),ok:false},{v:n(4),ok:true},{v:n(6),ok:false}],
  explain:'9 − 5 = 4. Проверка: 5 + 4 = 9 ✓'
},
{
  cat:'➕ Считаем',
  q:'Состав числа 10. Выбери ВЕРНОЕ равенство:',
  hint:'Два числа должны давать в сумме 10',
  vis:`<div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center">
         ${[10].map(()=>`<div style="background:#E8F5E9;border-radius:14px;padding:12px 20px;text-align:center">
           <div style="font-size:14px;font-weight:900;color:#2E7D32;margin-bottom:4px">Нужно получить</div>
           <div style="font-size:52px;font-weight:900;color:#1B2D1B">10</div>
         </div>`).join('')}

    {v:e('🐻',50)+L('Мишка'),ok:false},
  ],
  explain:'Узор: кот-кот-собака, кот-кот-собака, кот-кот-? → собака!'
},
];

/* ── ENGINE ── */
let tasks=[],idx=0,score=0,answered=false;
const shuffle=a=>[...a].sort(()=>Math.random()-.5);

function startGame(){
  tasks=shuffle(TASKS);
  idx=0;score=0;answered=false;
  show('task-screen');render();
}
function restart(){const c=document.getElementById('cv').getContext('2d');c.clearRect(0,0,9999,9999);startGame();}
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}

function render(){
  if(idx>=tasks.length){finish();return;}
  answered=false;
  document.getElementById('ex').className='explain';
  const t=tasks[idx],tot=tasks.length;
  document.getElementById('pf').style.width=(idx/tot*100)+'%';
  document.getElementById('pl').textContent=`Задание ${idx+1} из ${tot}`;
  document.getElementById('sb').textContent=`⭐ ${score}`;
  document.getElementById('pn').textContent=`Блок ${Math.ceil((idx+1)/5)} из 8`;
  document.getElementById('cp').textContent=t.cat;
  document.getElementById('tq').textContent=t.q;
  const hEl=document.getElementById('th');
  if(t.hint){hEl.textContent='💡 '+t.hint;hEl.style.display='block';}
  else{hEl.style.display='none';}
  document.getElementById('tv').innerHTML=t.vis;
  const sh=shuffle(t.opts);
  const grid=document.getElementById('op');
  grid.innerHTML='';
  sh.forEach(opt=>{
    const btn=document.createElement('button');
    btn.className='opt';
    btn.innerHTML=opt.v;
    btn.onclick=()=>pick(btn,opt.ok,grid,t.explain);
    grid.appendChild(btn);
  });
}

function pick(btn,ok,grid,explain){
  if(answered)return;
  answered=true;
  grid.querySelectorAll('.opt').forEach(b=>b.disabled=true);
  if(ok){score++;fb('🎉');}
  else{btn.classList.add('wrong');fb('😮');}
  if(explain){const ex=document.getElementById('ex');ex.textContent='💡 '+explain;ex.className='explain show';}
  setTimeout(()=>{idx++;render();},2600);
}

function fb(e){
  const el=document.getElementById('fb');
  el.textContent=e;el.classList.remove('pop');void el.offsetWidth;el.classList.add('pop');
  setTimeout(()=>el.classList.remove('pop'),700);
}

function finish(){
  show('finish');
  const tot=tasks.length,pct=score/tot;
  const fi=document.getElementById('fi');
  if(pct>=.85){fi.textContent='🏆';document.getElementById('ft').innerHTML='<span>Умница!</span> Готова к школе!';}
  else if(pct>=.65){fi.textContent='🌟';document.getElementById('ft').innerHTML='<span>Молодец!</span> Хороший результат!';}
  else if(pct>=.45){fi.textContent='🐱';document.getElementById('ft').innerHTML='Хорошо! <span>Продолжаем!</span>';}
  else{fi.textContent='🌿';document.getElementById('ft').innerHTML='<span>Тренируемся</span> дальше!';}
  document.getElementById('fs').textContent=`Правильных ответов: ${score} из ${tot}`;
  document.getElementById('fst').textContent=pct>=.85?'⭐⭐⭐⭐⭐':pct>=.65?'⭐⭐⭐⭐':pct>=.45?'⭐⭐⭐':'⭐⭐';
  if(pct>=.5)confetti();
}

function confetti(){
  const cv=document.getElementById('cv');
  const ctx=cv.getContext('2d');
  cv.width=window.innerWidth;cv.height=window.innerHeight;
  const C_=['#FF6B9D','#FF9B3C','#FFD93D','#4CAF50','#42A5F5','#26C6DA','#AB47BC'];
  const shapes=['🐱','🌸','⭐','🍀','🌟','🎉'];
  const ps=Array.from({length:90},()=>({
    x:Math.random()*cv.width,y:Math.random()*-cv.height,
    s:Math.random()*9+5,c:C_[Math.floor(Math.random()*C_.length)],
    sp:Math.random()*3.5+2,a:Math.random()*Math.PI*2,spin:(Math.random()-.5)*.2,
    isShape:Math.random()>.55,shape:shapes[Math.floor(Math.random()*shapes.length)]
  }));
  let fr;
  const draw=()=>{
    ctx.clearRect(0,0,cv.width,cv.height);
    ps.forEach(p=>{
      ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.a);
      if(p.isShape){ctx.font=`${p.s*3}px serif`;ctx.fillText(p.shape,-p.s*1.5,-p.s);}
      else{ctx.fillStyle=p.c;ctx.fillRect(-p.s/2,-p.s/2,p.s,p.s);}
      ctx.restore();
      p.y+=p.sp;p.a+=p.spin;if(p.y>cv.height)p.y=-20;
    });
    fr=requestAnimationFrame(draw);
  };
  draw();setTimeout(()=>{cancelAnimationFrame(fr);ctx.clearRect(0,0,cv.width,cv.height);},4500);
}
</script>
